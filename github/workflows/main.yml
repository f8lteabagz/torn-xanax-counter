name: Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pillow requests
      - env:
          TORN_API_KEY: ${{ secrets.TORN_API_KEY }}
        run: python update_stats.py
      - name: Push Image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xans_counter.jpg
          git commit -m "update stats" || exit 0
          git push --force
          
