name: Update Torn Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - run: pip install pillow requests
      
      - env:
          TORN_API_KEY: ${{ secrets.TORN_API_KEY }}
        run: python update_stats.py
        
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Xanax stats"
          file_pattern: 'xans_counter.jpg'
          
